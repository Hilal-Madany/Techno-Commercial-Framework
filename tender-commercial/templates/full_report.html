<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; padding: 0; color: #000; }
        .page { 
            width: 210mm; 
            min-height: 297mm; 
            padding: 20mm; 
            margin: 10mm auto; 
            background: white; 
            border: 1px solid #ddd;
        }
        .header-tbl { width: 100%; border: 2px solid #000; border-collapse: collapse; }
        .header-tbl td { border: 1px solid #000; padding: 10px; text-align: center; font-weight: bold; }
        
        .section-title { 
            background: #f2f2f2; 
            border: 1px solid #000; 
            padding: 8px; 
            font-weight: bold; 
            margin-top: 20px; 
            text-transform: uppercase; 
        }
        
        table.data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table.data-table th, table.data-table td { border: 1px solid #000; padding: 10px; text-align: left; }
        th { background: #fafafa; width: 40%; }

        .page-break { page-break-after: always; }

        @media print {
            .no-print { display: none; }
            .page { border: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="no-print" style="text-align:center; padding: 20px;">
        <button onclick="window.print()" style="padding: 10px 30px; background: #003366; color: white; cursor: pointer; border-radius: 5px;">📥 DOWNLOAD PDF REPORT</button>
    </div>

    <div class="page">
        <table class="header-tbl">
            <tr>
                <td width="20%">ACCUMEN</td>
                <td width="60%">OFFICIAL VENDOR ASSESSMENT</td>
                <td width="20%">{{ date }}</td>
            </tr>
        </table>

        <div class="section-title">I. COMPANY PROFILE</div>
        <table class="data-table">
            <tr><th>Company Name</th><td>{{ d.name }}</td></tr>
            <tr><th>Registered Office</th><td>{{ d.reg_office }}</td></tr>
        </table>

        <div class="section-title">II. LEGAL STATUS</div>
        <table class="data-table">
            <tr><th>PAN NO.</th><td>{{ d.pan }}</td></tr>
            <tr><th>GST NO.</th><td>{{ d.gst }}</td></tr>
        </table>
        
        <div class="page-break"></div>
        
        <div class="section-title">III. ASSESSMENT SUMMARY</div>
        <div style="border: 2px solid #000; padding: 20px; text-align: center; margin-top: 20px;">
            <h2 style="margin:0;">TOTAL SCORE: {{ d.score }} / 100</h2>
        </div>
    </div>
</body>
</html>
